language: "fr"
intents:
  NestorAddShopping:
    data:
      - sentences:
          - "nestor ajoute {item}"
          - "ajoute {item} à nestor"
          - "commande {item}"

  NestorMarkBought:
    data:
      - sentences:
          - "nestor marque {item} acheté"
          - "nestor j'ai acheté {item}"

  NestorCompleteRoutine:
    data:
      - sentences:
          - "nestor routine {routine} faite"
          - "nestor j'ai fait {routine}"

  NestorRefresh:
    data:
      - sentences:
          - "rafraîchis nestor"
          - "actualise nestor"

lists:
  item:
    wildcard: true
  routine:
    wildcard: true
